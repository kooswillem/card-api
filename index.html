<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Item Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        h1, h2 {
            color: #333;
        }
        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background-color: #dc3545;
            padding: 6px 10px;
            font-size: 14px;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    <h1>Item Manager</h1>
    
    <!-- Form to Add Items -->
    <form id="itemForm">
        <input type="text" id="itemName" placeholder="Enter item name..." required>
        <button type="submit">Add Item</button>
    </form>

    <h2>Current Items</h2>
    <!-- List to Display Items -->
    <ul id="itemList"></ul>

    <script>
        // REPLACE THIS WITH YOUR LIVE DOMAIN
        const API_URL = 'https://yourdomain.com';

        const itemForm = document.getElementById('itemForm');
        const itemNameInput = document.getElementById('itemName');
        const itemList = document.getElementById('itemList');

        // 1. FETCH AND LIST ITEMS (GET)
        async function fetchItems() {
            try {
                const response = await fetch(API_URL);
                const items = await response.json();
                
                itemList.innerHTML = ''; // Clear current UI list
                
                items.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${item.name}</span>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
                    `;
                    itemList.appendChild(li);
                });
            } catch (error) {
                console.error('Error fetching items:', error);
            }
        }

        // 2. CREATE A NEW ITEM (POST)
        itemForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = itemNameInput.value.trim();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });

                if (response.ok) {
                    itemNameInput.value = ''; // Clear input field
                    fetchItems(); // Refresh the list
                }
            } catch (error) {
                console.error('Error adding item:', error);
            }
        });

        // 3. DELETE AN ITEM (DELETE)
        async function deleteItem(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    fetchItems(); // Refresh the list
                }
            } catch (error) {
                console.error('Error deleting item:', error);
            }
        }

        // Initial load of items when page opens
        fetchItems();
    </script>
</body>
</html>
